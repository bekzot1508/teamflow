{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl mx-auto space-y-6">

  <div>
    <h1 class="text-3xl font-bold text-gray-900">

          Welcome, {{ request.user.full_name|default:request.user.email }}

    </h1>
    <p class="text-gray-500 mt-1">
      Manage your workspaces and tasks
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <a href="{% url 'workspaces:list' %}"
       class="bg-white p-6 rounded-xl shadow hover:shadow-md transition">
      <h2 class="text-lg font-semibold text-gray-900">Workspaces</h2>
      <p class="text-sm text-gray-500 mt-2">
        Manage teams and projects
      </p>
    </a>

    <a href="{% url 'notifications:list' %}"
       class="bg-white p-6 rounded-xl shadow hover:shadow-md transition">
      <h2 class="text-lg font-semibold text-gray-900">Notifications</h2>
      <p class="text-sm text-gray-500 mt-2">
        View updates and mentions
      </p>
    </a>

    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-lg font-semibold text-gray-900">Profile</h2>
      <p class="text-sm text-gray-500 mt-2">
        {{ request.user.email }}
      </p>
    </div>

  </div>

</div>
{% endblock %}
