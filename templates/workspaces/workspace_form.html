{% extends "base.html" %}

{% block content %}
    <div class="max-w-xl mx-auto bg-white rounded-xl shadow p-6">
      <h1 class="text-2xl font-bold mb-6">
        {% if is_update %}Update Workspace{% else %}Create Workspace{% endif %}
      </h1>

      <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Name
          </label>
          {{ form.name }}
          {{ form.name.errors }}
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Description
          </label>
          {{ form.description }}
          {{ form.description.errors }}
        </div>

       <button class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700">
          {% if is_update %}Save Changes{% else %}Create{% endif %}
       </button>
      </form>
    </div>
{% endblock %}
