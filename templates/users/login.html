{% extends "base.html" %}

{% block content %}
<h2 class="text-xl font-bold mb-4">Login</h2>

<form method="post">
  {% csrf_token %}
  <input name="email" placeholder="Email" class="border p-2 block mb-2">
  <input name="password" type="password" placeholder="Password" class="border p-2 block mb-2">

  <button class="bg-blue-600 text-white px-4 py-2">
    Login
  </button>
</form>
{% endblock %}
